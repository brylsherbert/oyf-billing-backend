version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: oyf-billing-backend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: oyf-api
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      DB_NAME: oyf-billing-backend
      DB_HOST: db   # 🔥 IMPORTANT CHANGE
      DB_PORT: 5432
      JWT_SECRET_KEY: zCFvkuJcIFd6WNiYVNLa9ttf2KvcaPHF6ST58ISbmWQ=
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
    depends_on:
      - db

volumes:
  pgdata: